name = "bridgehook-relay"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "CHANNEL", class_name = "ChannelDO" },
  { name = "USER", class_name = "UserDO" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChannelDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserDO"]

# ── Scheduled cleanup ─────────────────────────────────────────────────────
# Runs hourly. The handler in src/index.ts deletes channels whose
# expires_at < now() (events cascade via FK).
[triggers]
crons = ["0 * * * *"]

# ── Rate-limit KV namespace ───────────────────────────────────────────────
# Per-IP token bucket for POST /api/channels (10 req/min).
# Soft-fails if binding is absent, so dev still works without KV.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "647c7df6a0e64bf3882738057ad42f38"

# ── Auth / billing / mailer config ────────────────────────────────────────
# All optional. When BETTER_AUTH_SECRET is unset the relay runs in self-host
# mode: /auth/** returns 404, channel creates resolve to the implicit
# SELF_HOST_USER_ID user (or auto-created self-host@local), no quotas, no
# Stripe paywall. Set the secrets via `wrangler secret put`.
#
# Required to enable hosted-mode auth:
#   BETTER_AUTH_SECRET   — random 32+ byte secret (cookie signing, CSRF)
#   BETTER_AUTH_URL      — e.g. https://relay.bridgehook.dev
#
# Optional:
#   AUTH_COOKIE_DOMAIN   — e.g. ".bridgehook.dev" for cross-subdomain cookies
#   AUTH_TRUSTED_ORIGINS — comma-separated allowlist for Better-Auth CSRF
#   WEB_URL              — base URL of the dashboard (e.g. https://app.bridgehook.dev),
#                          used to build the verificationUrl during device pairing
#   RESEND_API_KEY       — magic-link delivery (falls back to console mailer)
#   MAIL_FROM            — sender address ("BridgeHook <noreply@bridgehook.dev>")
#   SELF_HOST_USER_ID    — explicit single-user id for self-hosted instances
#
# Polar billing (all optional — unset = self-host shape, /api/me/billing/* → 503):
#   POLAR_ACCESS_TOKEN     — server token from polar.sh dashboard
#   POLAR_WEBHOOK_SECRET   — webhook secret (whsec_…) for signature verification
#   POLAR_PRODUCT_ID_HOBBY — Polar product id for the Hobby tier
#   POLAR_PRODUCT_ID_PRO   — Polar product id for the Pro tier
#   POLAR_PRODUCT_ID_TEAM  — Polar product id for the Team tier
#
# Wildcard webhook intake (Phase 2):
#   TUNNEL_DOMAIN          — apex domain, e.g. "bridgehook.dev". When set,
#                            POST/PUT/PATCH on <channelId>.<TUNNEL_DOMAIN>/* lands
#                            directly in the webhook receiver. GET on the same
#                            host returns 405 (no website hosting).
#                            DNS: A record on `*.bridgehook.dev` → 192.0.2.0
#                            with the orange-cloud proxy on, plus a Worker route
#                            `*.bridgehook.dev/*`. Reserved subdomains
#                            (relay, app, www, docs, api) are excluded.
#
# Non-secret defaults can also live under [vars] block if needed.

# [vars]
# TUNNEL_DOMAIN — re-enable once you own bridgehook.dev and have set up
# Phase 1 DNS (wildcard A record on *.bridgehook.dev → orange-cloud proxy
# + Worker route `*.bridgehook.dev/*`). With it set, buildWebhookUrl()
# emits `https://<channelId>.<TUNNEL_DOMAIN>` as the webhook URL surfaced
# to users; with it unset the relay falls back to the legacy
# `${origin}/hook/<id>` form on whatever host the relay is reached at —
# which works today because the worker is live at
# bridgehook-relay.halleluyaholudele.workers.dev.
#
# When ready to flip on:
#   [vars]
#   TUNNEL_DOMAIN = "bridgehook.dev"
