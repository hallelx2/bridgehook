name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @bridgehook/shared is a TypeScript project-reference target; the
      # downstream apps' `tsc --noEmit` resolves types via the built .d.ts
      # files in packages/shared/dist, so we need a fresh build first.
      # (The Build Web / Build Docs jobs run `tsc -b` which cascades and
      # doesn't need this — only the --noEmit form does.)
      - run: pnpm --filter @bridgehook/shared build
      - run: pnpm -r typecheck

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bridgehook/web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bridgehook/docs build
      - uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/dist

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
